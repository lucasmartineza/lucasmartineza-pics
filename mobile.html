*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;font-family:'Montserrat',sans-serif;overflow:hidden;}
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap');

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;padding:28px 0 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(to bottom,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0.4) 70%,transparent 100%);}
.header-name{font-weight:300;font-size:0.98rem;letter-spacing:0.3em;text-transform:uppercase;color:#fff;}
.header-sub{font-weight:300;font-size:0.68rem;letter-spacing:0.06em;color:rgba(255,255,255,0.45);text-align:center;padding:3px 20px 0;line-height:1.7;}

/* TAB BAR */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:60px;padding-bottom:env(safe-area-inset-bottom,0);background:rgba(0,0,0,0.92);border-top:0.5px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-around;}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:8px 16px;}
.tab svg{width:22px;height:22px;stroke:rgba(255,255,255,0.3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s;}
.tab span{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);transition:color 0.2s;}
.tab.active svg{stroke:#fff;}
.tab.active span{color:#fff;}

/* PAGES */
.page{position:fixed;inset:0;background:#000;display:none;}
.page.active{display:block;}

/* HOME PAGE */
#pageHome{overflow:hidden;}
.carousel{position:absolute;inset:0;overflow:hidden;}
.slides{display:flex;height:100%;transition:transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);will-change:transform;}
.slide{flex-shrink:0;width:100vw;height:100%;display:flex;align-items:center;justify-content:center;position:relative;}
.slide img{width:100%;height:100%;object-fit:contain;display:block;}
.slide-prev,.slide-next{position:absolute;top:50%;transform:translateY(-50%);opacity:0.15;pointer-events:none;}
.slide-prev{left:0;width:12%;height:60%;background:linear-gradient(to right,rgba(0,0,0,0.5),transparent);}
.slide-next{right:0;width:12%;height:60%;background:linear-gradient(to left,rgba(0,0,0,0.5),transparent);}
.slide-meta{position:absolute;bottom:72px;left:16px;display:flex;flex-direction:column;gap:2px;}
.slide-meta span{font-size:9px;letter-spacing:0.08em;color:rgba(255,255,255,0.5);line-height:1.5;font-weight:300;}
.slide-meta span.hi{color:rgba(255,255,255,0.85);}
.slide-counter{position:absolute;bottom:72px;right:16px;font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.3);}

/* GALLERY PAGE */
#pageGallery{overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:48px;padding-bottom:60px;}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.gallery-item{aspect-ratio:1;overflow:hidden;background:#111;cursor:pointer;}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block;}

/* ABOUT PAGE */
#pageAbout{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:64px 24px 80px;}
.about-photo-wrap{display:flex;justify-content:center;margin-bottom:32px;}
.about-photo-wrap img{width:140px;height:140px;border-radius:50%;object-fit:cover;object-position:center top;filter:grayscale(20%) brightness(0.9);}
.about-text p{font-weight:300;font-size:0.8rem;line-height:1.9;letter-spacing:0.02em;color:rgba(255,255,255,0.6);margin-bottom:1.4em;text-align:justify;}
.about-text p:last-child{margin-bottom:0;}
.about-spotify{margin-top:32px;}
.about-spotify iframe{width:100%;border-radius:10px;}

.cf-nav{position:absolute;top:50%;transform:translateY(-50%);width:100%;display:flex;justify-content:space-between;padding:0 8px;pointer-events:none;z-index:10;}
.cf-btn{pointer-events:all;background:rgba(0,0,0,0.35);border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);width:36px;height:36px;font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px;}
/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lb-img{max-width:95vw;max-height:70vh;width:auto;height:auto;object-fit:contain;display:block;}
.lb-close{position:absolute;top:16px;right:20px;font-size:1.6rem;color:rgba(255,255,255,0.6);background:none;border:none;cursor:pointer;}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:100%;display:flex;justify-content:space-between;padding:0 8px;pointer-events:none;}
.lb-btn{pointer-events:all;background:rgba(0,0,0,0.4);border:0.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);width:44px;height:44px;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px;}
.lb-meta{margin-top:16px;text-align:center;display:flex;flex-direction:column;gap:4px;}
.lb-meta span{font-size:10px;letter-spacing:0.1em;color:rgba(255,255,255,0.4);}
.lb-meta span.hi{color:rgba(255,255,255,0.75);}
</style>
</head>

var NH = HERO.length, NG = GALLERY.length;

// About text
document.getElementById('aboutText').innerHTML = [
  'I approach rally photography from a place that tries to move away from the most obvious. I am not solely interested in speed or the most spectacular moment, but also in what happens around it: the tension beforehand, the in-between instants, the relationship between the car and its surroundings.',
  'I seek to construct the image rather than merely record it. In a context that tends to be chaotic and unpredictable, I am drawn to finding a certain order, a certain harmony. That is why the landscape often carries as much weight as the action, and framing becomes a tool for balancing those elements.',
  'I do not want the images to shout or impose themselves through immediate impact. I am interested in the opposite: that they operate on a quieter register, that they compel or invite a brief pause. That within that pause, details emerge that are not visible at first glance: a suggested trajectory, a relationship of scales, an atmosphere.',
  'My approach sits closer to an authorial vision than to pure documentation, without losing touch with what actually happens. I am interested not only in showing what occurred, but in conveying, to some degree, what it felt like to be there.',
  'In some ways, these images also seek to detach from the noise and urgency of the moment in which they were taken. They invite being seen from a distance, in another time, where the chaos no longer dominates the scene.'
].map(function(p){return '<p>'+p+'</p>';}).join('');

// Build slides
var slidesEl = document.getElementById('slides');
HERO.forEach(function(d,i){
  var div = document.createElement('div');
  div.className = 'slide';
  var img = new Image();
  img.src = 'fotos-hero-m/' + d.file;
  div.appendChild(img);
  if(d.meta){
    var meta = document.createElement('div');
    meta.className = 'slide-meta';
    if(d.meta.camera) meta.innerHTML += '<span class="hi">'+d.meta.camera+'</span>';
    if(d.meta.lens)   meta.innerHTML += '<span>'+d.meta.lens+'</span>';
    var tech = [d.meta.iso,d.meta.shutter,d.meta.aperture].filter(Boolean).join('  ');
    if(tech) meta.innerHTML += '<span>'+tech+'</span>';
    div.appendChild(meta);
  }
  slidesEl.appendChild(div);
});

// Build gallery
var gridEl = document.getElementById('galleryGrid');
GALLERY.forEach(function(d,i){
  var div = document.createElement('div');
  div.className = 'gallery-item';
  var img = new Image();
  img.src = 'fotos-m/' + d.file;
  div.appendChild(img);
  div.addEventListener('click',(function(idx){return function(){openLB(idx);};})(i));
  gridEl.appendChild(div);
});

// Carousel
var cur = 0;
var counterEl = document.getElementById('slideCounter');
function updateCounter(){ counterEl.textContent = (cur+1)+' / '+NH; }
function goTo(n){
  cur = (n+NH)%NH;
  slidesEl.style.transition = 'transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)';
  slidesEl.style.transform = 'translateX(-'+(cur*window.innerWidth)+'px)';
  updateCounter();
}
updateCounter();
// no autoplay

// Arrow nav
document.getElementById('cfPrev').addEventListener('click',function(){goTo(cur-1);});
document.getElementById('cfNext').addEventListener('click',function(){goTo(cur+1);});
// Swipe with follow-finger
var tx=null,ty=null,dragging=false,startOffset=0;
function setOff(x){slidesEl.style.transform='translateX('+x+'px)';}
slidesEl.addEventListener('touchstart',function(e){
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;
  dragging=false;startOffset=-(cur*window.innerWidth);
  slidesEl.style.transition='none';
},{passive:true});
slidesEl.addEventListener('touchmove',function(e){
  if(tx===null)return;
  var dx=e.touches[0].clientX-tx;
  var dy=e.touches[0].clientY-ty;
  if(!dragging&&Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8){dragging=true;}
  if(dragging){setOff(startOffset+dx*0.85);}
},{passive:true});
slidesEl.addEventListener('touchend',function(e){
  if(tx===null)return;
  var dx=e.changedTouches[0].clientX-tx;
  slidesEl.style.transition='transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)';
  if(dragging&&Math.abs(dx)>50){dx<0?goTo(cur+1):goTo(cur-1);}
  else{setOff(startOffset);}
  tx=null;ty=null;dragging=false;
},{passive:true});

// Tabs
function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
}
document.getElementById('tabHome').addEventListener('click',function(){showPage('pageHome');this.classList.add('active');});
document.getElementById('tabGallery').addEventListener('click',function(){showPage('pageGallery');this.classList.add('active');});
document.getElementById('tabAbout').addEventListener('click',function(){showPage('pageAbout');this.classList.add('active');});
document.getElementById('tabSpotify').addEventListener('click',function(){window.open('https://open.spotify.com/playlist/3NimH9q2tjkia3ocon5MsH','_blank');document.getElementById('tabHome').click();});

// Lightbox
var lbCur=0;
function openLB(idx){
  lbCur=idx;
  document.getElementById('lbImg').src='fotos-m/'+GALLERY[lbCur].file;
  renderMeta(GALLERY[lbCur].meta);
  document.getElementById('lightbox').classList.add('open');
}
function closeLB(){document.getElementById('lightbox').classList.remove('open');}
function lbGoTo(n){lbCur=(n+NG)%NG;document.getElementById('lbImg').src='fotos-m/'+GALLERY[lbCur].file;renderMeta(GALLERY[lbCur].meta);}
function renderMeta(m){
  var el=document.getElementById('lbMeta');
  if(!m){el.innerHTML='';return;}
  var html='';
  if(m.camera)html+='<span class="hi">'+m.camera+'</span>';
  if(m.lens)html+='<span>'+m.lens+'</span>';
  var tech=[m.iso,m.shutter,m.aperture].filter(Boolean).join('  ');
  if(tech)html+='<span>'+tech+'</span>';
  el.innerHTML=html;
}
document.getElementById('lbClose').addEventListener('click',closeLB);
document.getElementById('lbPrev').addEventListener('click',function(){lbGoTo(lbCur-1);});
document.getElementById('lbNext').addEventListener('click',function(){lbGoTo(lbCur+1);});
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLB();});
</script>
</body>
</html>
